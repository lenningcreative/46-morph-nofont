<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Distort</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0e0e0e;
  color: #e0e0e0;
  font-family: system-ui, -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
}

#sidebar {
  width: 220px;
  min-width: 220px;
  height: 100vh;
  border-right: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  padding: 28px 20px;
  gap: 24px;
}

.wordmark {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.22);
}

.drop-zone {
  border: 1px dashed rgba(255,255,255,0.14);
  border-radius: 10px;
  padding: 22px 10px;
  text-align: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, background 0.2s;
  flex-shrink: 0;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: rgba(255,255,255,0.32);
  background: rgba(255,255,255,0.03);
}
.drop-zone.loaded {
  padding: 0;
  border-style: solid;
  border-color: rgba(255,255,255,0.12);
}
.drop-zone.loaded img {
  width: 100%;
  height: 110px;
  object-fit: cover;
  border-radius: 9px;
  display: block;
  filter: brightness(0.65);
}
.drop-zone input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.dz-icon { font-size: 22px; opacity: 0.18; margin-bottom: 8px; }
.dz-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
.dz-sub { font-size: 10px; color: rgba(255,255,255,0.18); }
.dz-swap {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 6px;
  font-size: 10px;
  letter-spacing: 0.07em;
  color: rgba(255,255,255,0.4);
  background: rgba(0,0,0,0.5);
  text-align: center;
  border-radius: 0 0 9px 9px;
  opacity: 0;
  transition: opacity 0.2s;
}
.drop-zone.loaded:hover .dz-swap { opacity: 1; }

#controls {
  display: none;
  flex-direction: column;
  gap: 20px;
  flex: 1;
}

.ctrl-group { display: flex; flex-direction: column; gap: 8px; }
.ctrl-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.ctrl-label span:first-child {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
}
.ctrl-label span:last-child {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
}
input[type=range] {
  width: 100%;
  accent-color: rgba(255,255,255,0.55);
  cursor: pointer;
}

#dl-btn {
  margin-top: auto;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.18);
  background: none;
  color: rgba(255,255,255,0.55);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  display: none;
}
#dl-btn:hover {
  border-color: rgba(255,255,255,0.4);
  color: rgba(255,255,255,0.9);
  background: rgba(255,255,255,0.05);
}

#canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

#drop-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: rgba(255,255,255,0.12);
  pointer-events: none;
}
#drop-overlay .big-plus { font-size: 48px; }
#drop-overlay p { font-size: 13px; letter-spacing: 0.06em; }

canvas {
  display: none;
  max-width: 100%;
  max-height: 100vh;
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="wordmark">Image Distort</div>

  <div class="drop-zone" id="zone">
    <div class="dz-icon">+</div>
    <div class="dz-label">Drop image here</div>
    <div class="dz-sub">PNG · JPG · WebP</div>
    <input type="file" accept="image/*" id="file-input">
  </div>

  <div id="controls">
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Blur</span><span id="blur-val">0px</span></div>
      <input type="range" id="blur-amount" min="0" max="60" value="0" step="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Motion blur</span><span id="motion-val">0px</span></div>
      <input type="range" id="motion-amount" min="0" max="80" value="0" step="2">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Noise</span><span id="noise-val">0%</span></div>
      <input type="range" id="noise-amount" min="0" max="80" value="0" step="1">
    </div>
  </div>

  <button id="dl-btn">&#8595; Download PNG</button>
</div>

<div id="canvas-area">
  <div id="drop-overlay">
    <div class="big-plus">+</div>
    <p>Drop an image to begin</p>
  </div>
  <canvas id="c"></canvas>
</div>

<script>
let srcImg = null;
let blurPx = 0, motionPx = 0, noisePct = 0;
let W, H;
let renderDebounce = null;

const zone         = document.getElementById('zone');
const fileInput    = document.getElementById('file-input');
const controls     = document.getElementById('controls');
const dlBtn        = document.getElementById('dl-btn');
const overlay      = document.getElementById('drop-overlay');
const canvas       = document.getElementById('c');
const ctx          = canvas.getContext('2d');
const canvasArea   = document.getElementById('canvas-area');
const blurSlider   = document.getElementById('blur-amount');
const motionSlider = document.getElementById('motion-amount');
const noiseSlider  = document.getElementById('noise-amount');
const blurValEl    = document.getElementById('blur-val');
const motionValEl  = document.getElementById('motion-val');
const noiseValEl   = document.getElementById('noise-val');

// ---- FILE LOAD ----
function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      srcImg = img;
      W = img.naturalWidth;
      H = img.naturalHeight;
      canvas.width = W;
      canvas.height = H;
      sizeCanvas();
      overlay.style.display = 'none';
      canvas.style.display = 'block';
      controls.style.display = 'flex';
      dlBtn.style.display = 'block';
      render();
    };
    img.src = e.target.result;

    zone.innerHTML = '';
    const thumb = document.createElement('img');
    thumb.src = e.target.result;
    const swap = document.createElement('div');
    swap.className = 'dz-swap';
    swap.textContent = 'swap image';
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = ev => loadFile(ev.target.files[0]);
    zone.appendChild(thumb);
    zone.appendChild(swap);
    zone.appendChild(inp);
    zone.classList.add('loaded');
  };
  reader.readAsDataURL(file);
}

fileInput.onchange = e => loadFile(e.target.files[0]);
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); loadFile(e.dataTransfer.files[0]); });
canvasArea.addEventListener('dragover', e => e.preventDefault());
canvasArea.addEventListener('drop', e => { e.preventDefault(); loadFile(e.dataTransfer.files[0]); });

function sizeCanvas() {
  const area = canvasArea.getBoundingClientRect();
  const scale = Math.min(area.width / W, area.height / H, 1);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', () => { if (W) sizeCanvas(); });

// ---- SLIDERS ----
function scheduleRender() {
  clearTimeout(renderDebounce);
  renderDebounce = setTimeout(render, 60);
}

blurSlider.oninput = () => {
  blurPx = +blurSlider.value;
  blurValEl.textContent = blurPx + 'px';
  scheduleRender();
};
motionSlider.oninput = () => {
  motionPx = +motionSlider.value;
  motionValEl.textContent = motionPx + 'px';
  scheduleRender();
};
noiseSlider.oninput = () => {
  noisePct = +noiseSlider.value;
  noiseValEl.textContent = noisePct + '%';
  scheduleRender();
};

// ---- RENDER ----
function render() {
  if (!srcImg) return;

  // Start fresh
  ctx.clearRect(0, 0, W, H);

  // 1. Gaussian blur via CSS filter
  ctx.filter = blurPx > 0 ? `blur(${blurPx}px)` : 'none';
  ctx.drawImage(srcImg, 0, 0);
  ctx.filter = 'none';

  // 2. Motion blur — stack translucent offset copies diagonally
  if (motionPx > 0) {
    const steps = Math.max(4, Math.floor(motionPx / 3));
    const alpha = 0.55 / steps;
    for (let i = 1; i <= steps; i++) {
      const d = (i / steps) * motionPx;
      ctx.globalAlpha = alpha;
      ctx.drawImage(canvas, d, d * 0.4);
    }
    ctx.globalAlpha = 1;
  }

  // 3. Grain noise
  if (noisePct > 0) {
    const imageData = ctx.getImageData(0, 0, W, H);
    const data = imageData.data;
    const strength = noisePct / 100;
    for (let i = 0; i < data.length; i += 4) {
      const n = (Math.random() - 0.5) * 255 * strength;
      data[i]     = Math.min(255, Math.max(0, data[i]     + n));
      data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + n));
      data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + n));
    }
    ctx.putImageData(imageData, 0, 0);
  }
}

// ---- DOWNLOAD ----
dlBtn.addEventListener('click', () => {
  if (!srcImg) return;
  const a = document.createElement('a');
  a.download = 'distorted.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});
</script>
</body>
</html>
