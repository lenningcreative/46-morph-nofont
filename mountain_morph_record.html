<!DOCTYPE html>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
  canvas { max-width: 100%; border: 1px solid #333; }
  #status { color: #f0ede6; font-family: Georgia, serif; font-size: 13px; letter-spacing: 3px; opacity: 0.7; }

<canvas id="c" width="1200" height="675"></canvas>

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

const BASE_Y = 615;
const PX_PER_FT = 565 / 5500;
function parseElev(s) { return parseInt(s.replace(/\D/g, '')); }
function elevToY(ft) { return BASE_Y - ft * PX_PER_FT; }

function scalePts(pts, elevStr) {
  const elev = parseElev(elevStr);
  const targetY = elevToY(elev);
  const apexY = Math.min(...pts.map(p => p[1]));
  return pts.map(([x, y]) => {
    const sy = y >= BASE_Y ? BASE_Y : BASE_Y - (BASE_Y - y) * (BASE_Y - targetY) / (BASE_Y - apexY);
    return [x * 0.8, sy];
  });
}

  { name:"DIAL", elev:"4,020'", pts:[[160,615],[215,590],[295,545],[380,465],[460,355],[540,250],[605,200],[690,310],[785,435],[880,515],[970,575],[1040,615]]},
  { name:"EAST DIX", elev:"4,012'", pts:[[160,615],[220,590],[310,550],[400,470],[485,360],[548,245],[605,200],[675,305],[775,430],[880,525],[975,575],[1040,615]]},
  { name:"ESTHER", elev:"4,012'", pts:[[160,615],[215,590],[300,550],[385,470],[460,365],[530,250],[598,190],[680,290],[780,420],[880,515],[975,575],[1040,615]]},
  { name:"BLAKE", elev:"3,960'", pts:[[160,615],[220,590],[305,550],[392,470],[475,365],[540,255],[600,200],[673,295],[775,420],[875,515],[975,575],[1040,615]]},
  { name:"CLIFF", elev:"3,960'", pts:[[160,615],[230,590],[290,210],[365,225],[510,255],[580,205],[680,215],[790,355],[875,480],[945,555],[1000,585],[1040,615]]},
];

const BLOCKS = [[160,615],[220,435],[155,345],[235,250],[370,45],[545,615],[545,700],[635,700],[635,615],[635,90],[940,90],[1040,615]];
const BLOCKS_SCALED = BLOCKS.map(([x,y]) => [x*0.8, y]);

const HOLD = 576, MORPH = 1024, TEXT_FADE_IN = 256, TEXT_FADE_OUT = 192, TEXT_DELAY = 128;
const FIRST_HOLD = 1200;
const RUN0_DUR = FIRST_HOLD + MORPH + TEXT_DELAY + TEXT_FADE_IN + HOLD;
const RUN_DUR  = HOLD + MORPH + TEXT_DELAY + TEXT_FADE_IN + HOLD;
const TOTAL_MS = RUN0_DUR + (peaks.length - 1) * RUN_DUR;
const FPS = 30;
const MS_PER_FRAME = 1000 / FPS;
const TOTAL_FRAMES = Math.ceil(TOTAL_MS / MS_PER_FRAME);

const scaledPts = peaks.map(p => scalePts(p.pts, p.elev));

function ease(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpPts(a, b, t) { return a.map((p,i) => [lerp(p[0],b[i][0],t), lerp(p[1],b[i][1],t)]); }

function getState(t) {
  let runIdx, runStart, holdTime, fromIdx;
  if (t < RUN0_DUR) {
    runIdx = 0; runStart = 0; holdTime = FIRST_HOLD; fromIdx = -1;
  } else {
    runIdx = 1 + Math.floor((t - RUN0_DUR) / RUN_DUR);
    runIdx = Math.min(runIdx, peaks.length - 1);
    runStart = RUN0_DUR + (runIdx - 1) * RUN_DUR;
    holdTime = HOLD; fromIdx = runIdx - 1;
  }
  const toIdx   = runIdx;
  const fromPts = fromIdx === -1 ? BLOCKS_SCALED : scaledPts[fromIdx];
  const toPts   = scaledPts[toIdx];
  const elapsed = t - runStart;
  const morphElapsed = elapsed - holdTime;
  const rawT = morphElapsed < 0 ? 0 : Math.min(morphElapsed / MORPH, 1);
  const pts = lerpPts(fromPts, toPts, ease(rawT));

  let labelOpacity = 0, labelName = '', labelElev = '', rulerOpacity = 0, rulerElev = null;
  if (rawT < 1) {
    if (fromIdx >= 0 && morphElapsed >= 0) {
      const op = Math.max(0, 1 - morphElapsed / TEXT_FADE_OUT);
      labelOpacity = op; rulerOpacity = op;
      labelName = peaks[fromIdx].name; labelElev = peaks[fromIdx].elev; rulerElev = peaks[fromIdx].elev;
    }
  } else {
    const postMorph = morphElapsed - MORPH;
    const fadeInElapsed = postMorph - TEXT_DELAY;
    const ft = fadeInElapsed < 0 ? 0 : Math.min(fadeInElapsed / TEXT_FADE_IN, 1);
    labelOpacity = ft; rulerOpacity = ft;
    labelName = peaks[toIdx].name; labelElev = peaks[toIdx].elev; rulerElev = peaks[toIdx].elev;
  }
  return { pts, labelOpacity, labelName, labelElev, rulerOpacity, rulerElev };
}

function drawState({ pts, labelOpacity, labelName, labelElev, rulerOpacity, rulerElev }) {
  ctx.fillStyle = '#2e2c28';
  ctx.fillRect(0, 0, 1200, 675);

  ctx.fillStyle = '#f0ede6';
  ctx.beginPath();
  pts.forEach(([x,y],i) => i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = 'rgba(240,237,230,0.18)';
  ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(968,45); ctx.lineTo(968,620); ctx.stroke();

  ctx.strokeStyle = 'rgba(136,136,128,0.4)';
  ctx.lineWidth = 0.5;
  [101.4, 204.1, 306.8, 409.5, 512.3].forEach(y => {
    ctx.beginPath(); ctx.moveTo(963,y); ctx.lineTo(968,y); ctx.stroke();
  });

  ctx.textAlign = 'left';
  ctx.font = '9px Georgia,serif';
  ctx.fillStyle = 'rgba(136,136,128,0.45)';
  ctx.fillText('ft', 977, 42);
  ctx.font = '10px Georgia,serif';
  ctx.fillStyle = 'rgba(136,136,128,0.7)';
  [['5,000',105],['4,000',207.5],['3,000',310.5],['2,000',413],['1,000',515.8]].forEach(([lbl,y]) => ctx.fillText(lbl,977,y));

  if (rulerElev && rulerOpacity > 0) {
    const ry = elevToY(parseElev(rulerElev));
    ctx.globalAlpha = rulerOpacity * 0.8;
    ctx.strokeStyle = '#f0ede6'; ctx.lineWidth = 0.5;
    ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(840,ry); ctx.lineTo(968,ry); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#f0ede6';
    ctx.beginPath(); ctx.arc(968,ry,2.5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  if (labelOpacity > 0) {
    ctx.globalAlpha = labelOpacity;
    ctx.textAlign = 'center';
    ctx.font = '18px Georgia,serif';
    ctx.fillStyle = '#f0ede6';
    if (ctx.letterSpacing !== undefined) ctx.letterSpacing = '4px';
    ctx.fillText(labelName, 480, 645);
    ctx.font = '16px Georgia,serif';
    ctx.fillStyle = '#888880';
    if (ctx.letterSpacing !== undefined) ctx.letterSpacing = '1px';
    ctx.fillText(labelElev, 480, 663);
    ctx.globalAlpha = 1;
    if (ctx.letterSpacing !== undefined) ctx.letterSpacing = '0px';
  }
}

// MediaRecorder — captureStream(0) = manual frame cadence
const mimeType = MediaRecorder.isTypeSupported('video/mp4') ? 'video/mp4'
               : MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9'
               : 'video/webm';
const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';

const stream = canvas.captureStream(0);
const videoTrack = stream.getVideoTracks()[0];
const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
const chunks = [];
recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
recorder.onstop = () => {
  const blob = new Blob(chunks, { type: mimeType });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `adirondack-46-peaks.${ext}`;
  document.body.appendChild(a);
  a.click();
  statusEl.textContent = `DONE — adirondack-46-peaks.${ext}`;
};
recorder.start(500);

// MessageChannel pump — not throttled by tab visibility
const { port1, port2 } = new MessageChannel();
let frame = 0;

port1.onmessage = () => {
  if (frame > TOTAL_FRAMES) {
    recorder.stop();
    return;
  }
  const t = frame * MS_PER_FRAME;
  drawState(getState(t));
  videoTrack.requestFrame();
  frame++;
  if (frame % FPS === 0) {
    const pct = Math.min(100, Math.round(frame / TOTAL_FRAMES * 100));
    statusEl.textContent = `RENDERING ${pct}% — tab visibility doesn't matter`;
  }
  port2.postMessage(null);
};

port2.postMessage(null); // kick off
</script>
