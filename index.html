<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Moon Shot">
<meta name="theme-color" content="#272422">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<title>Moon Shot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:      #272422;
  --cream:   #ffffff;
  --coral:   #E07868;
  --dim:     rgba(255,255,255,0.6);
  --dimmer:  rgba(255,255,255,0.2);
  --line:    rgba(255,255,255,0.1);
}

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'neue-haas-grotesk-text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 300;
  height: 100vh;
  overflow: hidden;
  display: flex;
}

#sidebar {
  width: 210px;
  min-width: 210px;
  height: 100vh;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Wordmark ── */
.wordmark {
  padding: 22px 20px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 1.2rem;
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--coral);
  border-bottom: 1px solid var(--line);
}

/* ── Drop zone ── */
.drop-zone {
  border-bottom: 1px solid var(--line);
  padding: 24px 20px;
  text-align: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  transition: background 0.15s;
}
.drop-zone:hover, .drop-zone.dragover { background: rgba(255,255,255,0.03); }
.drop-zone.loaded { padding: 0; }
.drop-zone.loaded img,
.drop-zone.loaded video {
  width: 100%;
  height: 100px;
  object-fit: cover;
  display: block;
  filter: brightness(0.55);
}
.drop-zone input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.dz-icon { font-size: 18px; opacity: 0.15; margin-bottom: 10px; }
.dz-label {
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 6px;
}
.dz-sub {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--dimmer);
}
.dz-swap {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 7px;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--cream);
  background: rgba(30,27,25,0.8);
  text-align: center;
  opacity: 0;
  transition: opacity 0.15s;
}
.drop-zone.loaded:hover .dz-swap { opacity: 1; }

/* ── Controls ── */
#controls {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow-y: auto;
  scrollbar-width: none;
}
#controls::-webkit-scrollbar { display: none; }

.ctrl-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 18px 20px;
  border-bottom: 1px solid var(--line);
}
.ctrl-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.ctrl-label span:first-child {
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cream);
}
.ctrl-label span:last-child {
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--coral);
  font-variant-numeric: tabular-nums;
}

/* Custom slider */
input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 2px;
  background: var(--dimmer);
  border-radius: 99px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--coral);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 0 3px rgba(224,120,104,0.2);
}
input[type=range]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  background: var(--coral);
  border-radius: 50%;
  border: none;
  cursor: pointer;
}
input[type=range]:hover { background: var(--dim); }

/* Toggle */
.toggle-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.toggle-row > span {
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--cream);
}
.switch {
  position: relative;
  width: 40px;
  height: 22px;
  flex-shrink: 0;
}
.switch input { opacity: 0; width: 0; height: 0; }
.switch-track {
  position: absolute;
  inset: 0;
  background: var(--dimmer);
  border-radius: 99px;
  cursor: pointer;
  transition: background 0.2s;
}
.switch input:checked + .switch-track {
  background: var(--coral);
}
.switch-thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 16px;
  height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
  pointer-events: none;
}
.switch input:checked ~ .switch-thumb {
  transform: translateX(18px);
}

/* ── Buttons ── */
#btn-wrap {
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-top: 1px solid var(--line);
  margin-top: auto;
}
.btn {
  padding: 13px 16px;
  border: 1.5px solid var(--dimmer);
  border-radius: 99px;
  background: none;
  color: var(--cream);
  font-family: 'neue-haas-grotesk-text', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-weight: 300;
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
  display: none;
  width: 100%;
  text-align: center;
}
.btn:hover:not(:disabled) {
  background: var(--coral);
  border-color: var(--coral);
  color: #fff;
}
.btn:disabled {
  opacity: 0.3;
  cursor: default;
}
.btn.active {
  background: var(--coral);
  border-color: var(--coral);
  color: #fff;
}

/* Progress */
#progress-wrap {
  display: none;
  flex-direction: column;
  gap: 6px;
}
#progress-bar-track {
  width: 100%;
  height: 1px;
  background: var(--line);
  overflow: hidden;
}
#progress-bar {
  height: 100%;
  width: 0%;
  background: var(--coral);
  transition: width 0.2s linear;
}
#progress-label {
  font-size: 8px;
  letter-spacing: 0.18em;
  color: var(--dimmer);
  text-transform: uppercase;
  text-align: center;
}

/* ── Canvas area ── */
#canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
#drop-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--dimmer);
  pointer-events: none;
}
#drop-overlay .big-plus { font-size: 36px; font-weight: 300; }
#drop-overlay p {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
canvas {
  display: none;
  max-width: 100%;
  max-height: 100vh;
}

/* ── Mobile layout ── */
@media (max-width: 767px) {
  body {
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  #canvas-area {
    order: 1;
    flex: 1;
    min-height: 0;
  }

  canvas {
    max-height: 100%;
  }

  #sidebar {
    order: 2;
    width: 100%;
    min-width: unset;
    height: auto;
    border-right: none;
    border-top: 1px solid var(--line);
    flex-shrink: 0;
  }

  .wordmark {
    padding: 14px 16px 12px;
    font-size: 1rem;
  }

  .drop-zone {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
  }
  .drop-zone.loaded {
    padding: 0;
  }
  .drop-zone.loaded img,
  .drop-zone.loaded video {
    height: 56px;
    width: 100%;
  }
  .dz-icon { margin-bottom: 0; font-size: 16px; }
  .dz-label { margin-bottom: 0; }
  .dz-sub { display: none; }

  #controls {
    flex-direction: row;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    flex-wrap: nowrap;
    gap: 0;
  }
  #controls::-webkit-scrollbar { display: none; }

  .ctrl-group {
    min-width: 140px;
    flex-shrink: 0;
    border-bottom: none;
    border-right: 1px solid var(--line);
    padding: 14px 16px;
    gap: 10px;
  }

  #btn-wrap {
    flex-direction: row;
    padding: 12px 16px;
    gap: 10px;
    border-top: 1px solid var(--line);
  }

  .btn {
    padding: 11px 14px;
    font-size: 11px;
  }

  #drop-overlay p {
    font-size: 9px;
  }
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="wordmark">Moon Shot</div>

  <div class="drop-zone" id="zone">
    <div class="dz-icon">+</div>
    <div class="dz-label">Drop file here</div>
    <div class="dz-sub">PNG · JPG · WebP · MP4</div>
    <input type="file" accept="image/*,video/*" id="file-input">
  </div>

  <button class="btn" id="cam-btn" style="display:block; margin: 0 20px; width: auto;">&#9679; Live Camera</button>

  <div id="controls">
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Wind</span><span id="wind-val">4</span></div>
      <input type="range" id="wind-amount" min="0" max="100" value="4" step="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Noise</span><span id="noise-val">4%</span></div>
      <input type="range" id="noise-amount" min="0" max="80" value="4" step="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Brightness</span><span id="bright-val">100%</span></div>
      <input type="range" id="bright-amount" min="0" max="300" value="100" step="1">
    </div>
    <div class="ctrl-group" id="tracking-group" style="display:none">
      <div class="ctrl-label"><span>Tracking</span><span id="track-val">17</span></div>
      <input type="range" id="track-amount" min="0" max="100" value="17" step="1">
    </div>
    <div class="ctrl-group" id="slowmo-group" style="display:none">
      <div class="ctrl-label"><span>Slow Mo</span><span id="slowmo-val">100%</span></div>
      <input type="range" id="slowmo-amount" min="5" max="100" value="100" step="5">
    </div>
    <div class="ctrl-group">
      <div class="toggle-row">
        <span>High Contrast B&amp;W</span>
        <label class="switch">
          <input type="checkbox" id="bw-toggle">
          <div class="switch-track"></div>
          <div class="switch-thumb"></div>
        </label>
      </div>
    </div>
  </div>

  <div id="btn-wrap">
    <button class="btn" id="dl-btn">&#8595; Download PNG</button>
    <button class="btn" id="rec-btn">&#9679; Export MP4</button>
    <button class="btn" id="voice-btn" style="display:none">&#127908; Moon Voice</button>
    <div id="progress-wrap">
      <div id="progress-bar-track"><div id="progress-bar"></div></div>
      <div id="progress-label"></div>
    </div>
  </div>
</div>

<div id="canvas-area">
  <div id="drop-overlay">
    <div class="big-plus">+</div>
    <p>Drop an image or video to begin</p>
  </div>
  <canvas id="c"></canvas>
  <button id="flip-btn" style="display:none; position:absolute; bottom:16px; right:16px; width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); color:white; font-size:18px; cursor:pointer; backdrop-filter:blur(4px);" title="Flip camera">&#8645;</button>
</div>

<!-- Hidden video elements -->
<video id="src-video" style="display:none" muted loop playsinline crossorigin="anonymous"></video>
<video id="cam-video" style="display:none" muted playsinline autoplay></video>

<script>
let srcImg  = null;
let srcVid  = null;
let mode    = 'image'; // 'image' | 'video'
let windVal = 4, noisePct = 4, bwOn = false, trackVal = 17, brightVal = 100;
let W, H;
let renderDebounce = null;
let videoRafId = null;
let isRecording = false;
let recTimerInterval = null;

// VHS glitch state
let frozenFrame   = null; // offscreen canvas holding a frozen frame
let freezeFrames  = 0;    // how many frames left in current freeze
let glitchCanvas  = null; // scratch canvas for scan-line displacement
let glitchCtx     = null;

const zone        = document.getElementById('zone');
const fileInput   = document.getElementById('file-input');
const controls    = document.getElementById('controls');
const dlBtn       = document.getElementById('dl-btn');
const recBtn      = document.getElementById('rec-btn');
const overlay     = document.getElementById('drop-overlay');
const canvas      = document.getElementById('c');
const ctx         = canvas.getContext('2d');
const canvasArea  = document.getElementById('canvas-area');
const windSlider  = document.getElementById('wind-amount');
const noiseSlider = document.getElementById('noise-amount');
const windValEl   = document.getElementById('wind-val');
const noiseValEl  = document.getElementById('noise-val');
const bwToggle      = document.getElementById('bw-toggle');
const trackSlider   = document.getElementById('track-amount');
const trackValEl    = document.getElementById('track-val');
const trackingGroup = document.getElementById('tracking-group');
const slowmoSlider  = document.getElementById('slowmo-amount');
const slowmoValEl   = document.getElementById('slowmo-val');
const slowmoGroup   = document.getElementById('slowmo-group');
const brightSlider  = document.getElementById('bright-amount');
const brightValEl   = document.getElementById('bright-val');
const hiddenVid     = document.getElementById('src-video');
const progressWrap  = document.getElementById('progress-wrap');
const progressBar   = document.getElementById('progress-bar');
const progressLabel = document.getElementById('progress-label');
const voiceBtn      = document.getElementById('voice-btn');
const camBtn        = document.getElementById('cam-btn');
const camVideo      = document.getElementById('cam-video');
const flipBtn       = document.getElementById('flip-btn');

// ---- FILE LOAD ----
function loadFile(file) {
  if (!file) return;
  if (file.type.startsWith('image/')) loadImage(file);
  else if (file.type.startsWith('video/')) loadVideo(file);
}

function loadImage(file) {
  stopVideoLoop();
  stopCamera();
  mode = 'image';
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      srcImg = img;
      srcVid = null;
      W = img.naturalWidth;
      H = img.naturalHeight;
      canvas.width = W;
      canvas.height = H;
      sizeCanvas();
      showCanvas();
      dlBtn.style.display = 'block';
      recBtn.style.display = 'none';
      voiceBtn.style.display = 'none';
      stopMoonVoice();
      trackingGroup.style.display = 'none';
      slowmoGroup.style.display = 'none';
      render();
    };
    img.src = e.target.result;
    setThumb('img', e.target.result);
  };
  reader.readAsDataURL(file);
}

function loadVideo(file) {
  stopVideoLoop();
  stopCamera();
  mode = 'video';
  srcImg = null;
  const url = URL.createObjectURL(file);
  hiddenVid.src = url;
  hiddenVid.onloadedmetadata = () => {
    srcVid = hiddenVid;
    W = hiddenVid.videoWidth;
    H = hiddenVid.videoHeight;
    canvas.width = W;
    canvas.height = H;
    sizeCanvas();
    showCanvas();
    dlBtn.style.display = 'none';
    recBtn.style.display = 'block';
    voiceBtn.style.display = 'block';
    trackingGroup.style.display = 'flex';
    slowmoGroup.style.display = 'flex';
    hiddenVid.play();
    startVideoLoop();
  };
  setThumb('video', url);
}

function setThumb(type, src) {
  zone.innerHTML = '';
  let thumb;
  if (type === 'img') {
    thumb = document.createElement('img');
    thumb.src = src;
  } else {
    thumb = document.createElement('video');
    thumb.src = src;
    thumb.muted = true;
    thumb.loop = true;
    thumb.autoplay = true;
    thumb.playsInline = true;
  }
  const swap = document.createElement('div');
  swap.className = 'dz-swap';
  swap.textContent = 'swap file';
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*,video/*';
  inp.onchange = ev => loadFile(ev.target.files[0]);
  zone.appendChild(thumb);
  zone.appendChild(swap);
  zone.appendChild(inp);
  zone.classList.add('loaded');
}

function showCanvas() {
  overlay.style.display = 'none';
  canvas.style.display = 'block';
  controls.style.display = 'flex';
}

fileInput.onchange = e => loadFile(e.target.files[0]);
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); loadFile(e.dataTransfer.files[0]); });
canvasArea.addEventListener('dragover', e => e.preventDefault());
canvasArea.addEventListener('drop', e => { e.preventDefault(); loadFile(e.dataTransfer.files[0]); });

function sizeCanvas() {
  const area = canvasArea.getBoundingClientRect();
  const scale = Math.min(area.width / W, area.height / H, 1);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', () => { if (W) sizeCanvas(); });

// ---- VIDEO LOOP ----
function startVideoLoop() {
  if (videoRafId) return;
  function loop() {
    if (mode !== 'video' || !srcVid) return;
    render();
    videoRafId = requestAnimationFrame(loop);
  }
  videoRafId = requestAnimationFrame(loop);
}

function stopVideoLoop() {
  if (videoRafId) { cancelAnimationFrame(videoRafId); videoRafId = null; }
  if (hiddenVid.src) { hiddenVid.pause(); hiddenVid.src = ''; }
}

// ---- LIVE CAMERA ----
let cameraStream   = null;
let cameraFacing   = 'environment'; // 'environment' = rear, 'user' = front

async function startCamera() {
  stopVideoLoop();
  stopCamera();

  try {
    const constraints = { video: { facingMode: cameraFacing, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };
    cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
    camVideo.srcObject = cameraStream;
    await new Promise(r => { camVideo.onloadedmetadata = r; });

    srcImg = null;
    srcVid = camVideo;
    mode = 'video';
    W = camVideo.videoWidth  || 1280;
    H = camVideo.videoHeight || 720;
    canvas.width  = W;
    canvas.height = H;
    sizeCanvas();
    showCanvas();

    dlBtn.style.display    = 'none';
    recBtn.style.display   = 'block';
    voiceBtn.style.display = 'block';
    flipBtn.style.display  = 'flex';
    camBtn.textContent     = '&#9632; Stop Camera';
    camBtn.classList.add('active');
    trackingGroup.style.display = 'flex';
    slowmoGroup.style.display   = 'none'; // no duration for live camera

    startVideoLoop();
  } catch(e) {
    alert('Camera access denied or not available.');
  }
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  camVideo.srcObject = null;
  flipBtn.style.display = 'none';
  camBtn.textContent = '&#9679; Live Camera';
  camBtn.classList.remove('active');
}

camBtn.addEventListener('click', () => {
  if (cameraStream) {
    stopVideoLoop();
    stopCamera();
    srcVid = null;
    overlay.style.display = 'flex';
    canvas.style.display  = 'none';
    controls.style.display = 'none';
    recBtn.style.display   = 'none';
    voiceBtn.style.display = 'none';
    dlBtn.style.display    = 'none';
    // reset zone
    zone.innerHTML = '<div class="dz-icon">+</div><div class="dz-label">Drop file here</div><div class="dz-sub">PNG · JPG · WebP · MP4</div><input type="file" accept="image/*,video/*" id="file-input">';
    document.getElementById('file-input').onchange = e => loadFile(e.target.files[0]);
    zone.classList.remove('loaded');
  } else {
    startCamera();
  }
});

flipBtn.addEventListener('click', async () => {
  cameraFacing = cameraFacing === 'environment' ? 'user' : 'environment';
  await startCamera();
});

// ---- SLIDERS ----
function scheduleRender() {
  if (mode === 'video') return; // video loop re-renders continuously
  clearTimeout(renderDebounce);
  renderDebounce = setTimeout(render, 60);
}

windSlider.oninput = () => { windVal = +windSlider.value; windValEl.textContent = windVal; scheduleRender(); };
noiseSlider.oninput = () => { noisePct = +noiseSlider.value; noiseValEl.textContent = noisePct + '%'; scheduleRender(); };
brightSlider.oninput = () => { brightVal = +brightSlider.value; brightValEl.textContent = brightVal + '%'; scheduleRender(); };
bwToggle.onchange = () => { bwOn = bwToggle.checked; scheduleRender(); };
trackSlider.oninput = () => { trackVal = +trackSlider.value; trackValEl.textContent = trackVal; };
slowmoSlider.oninput = () => { const pct = +slowmoSlider.value; slowmoValEl.textContent = pct + '%'; if (hiddenVid) hiddenVid.playbackRate = pct / 100; };

// ---- RENDER ----
// scale > 1 renders to an offscreen canvas at higher resolution for download
function renderToCtx(targetCtx, targetCanvas, tw, th, scale) {
  scale = scale || 1;
  const source = mode === 'video' ? srcVid : srcImg;
  if (!source) return;

  targetCtx.clearRect(0, 0, tw, th);

  const blurPx   = windVal * 0.2 * scale;
  const motionPx = windVal * 4.5 * scale;

  const filters = [];
  if (blurPx > 0) filters.push(`blur(${blurPx}px)`);
  if (brightVal !== 100) filters.push(`brightness(${brightVal}%)`);
  targetCtx.filter = filters.length ? filters.join(' ') : 'none';
  targetCtx.drawImage(source, 0, 0, tw, th);
  targetCtx.filter = 'none';

  if (motionPx > 0) {
    const steps = Math.max(20, Math.floor(motionPx / 3));
    const alpha = 0.85 / steps;
    let seed = 42;
    const rand = () => { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; };
    for (let i = 1; i <= steps; i++) {
      const t = i / steps;
      const dx = t * motionPx;
      const dy = (rand() - 0.5) * motionPx * 0.06;
      targetCtx.globalAlpha = alpha * (1 - t * 0.5);
      targetCtx.drawImage(targetCanvas, dx, dy);
    }
    targetCtx.globalAlpha = 1;
  }

  // VHS tracking glitch (video only)
  if (mode === 'video' && trackVal > 0 && scale === 1) {
    const intensity = trackVal / 100;
    if (freezeFrames <= 0 && Math.random() < intensity * 0.08) {
      if (!frozenFrame) { frozenFrame = document.createElement('canvas'); }
      frozenFrame.width = W; frozenFrame.height = H;
      frozenFrame.getContext('2d').drawImage(canvas, 0, 0);
      freezeFrames = Math.floor(2 + Math.random() * intensity * 18);
    }
    if (freezeFrames > 0) {
      targetCtx.drawImage(frozenFrame, 0, 0);
      freezeFrames--;
    }
    if (!glitchCanvas) { glitchCanvas = document.createElement('canvas'); glitchCtx = glitchCanvas.getContext('2d'); }
    glitchCanvas.width = tw; glitchCanvas.height = th;
    glitchCtx.drawImage(targetCanvas, 0, 0);
    const bandH = Math.max(2, Math.floor(4 + (1 - intensity) * 12));
    for (let y = 0; y < th; y += bandH) {
      if (Math.random() < intensity * 0.35) {
        const shift = (Math.random() - 0.5) * intensity * tw * 0.18;
        targetCtx.drawImage(glitchCanvas, 0, y, tw, bandH, shift, y, tw, bandH);
      }
    }
  }

  if (bwOn || noisePct > 0) {
    const imageData = targetCtx.getImageData(0, 0, tw, th);
    const data = imageData.data;
    if (bwOn) {
      for (let i = 0; i < data.length; i += 4) {
        const lum = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
        const t = lum / 255;
        const c = Math.pow(t, 0.75) * 255;
        const hc = Math.min(255, Math.max(0, (c - 128) * 1.6 + 128));
        data[i] = data[i+1] = data[i+2] = hc;
      }
    }
    if (noisePct > 0) {
      const strength = noisePct / 100;
      for (let i = 0; i < data.length; i += 4) {
        const n = (Math.random() - 0.5) * 255 * strength;
        data[i]   = Math.min(255, Math.max(0, data[i]   + n));
        data[i+1] = Math.min(255, Math.max(0, data[i+1] + n));
        data[i+2] = Math.min(255, Math.max(0, data[i+2] + n));
      }
    }
    targetCtx.putImageData(imageData, 0, 0);
  }
}

function render() { renderToCtx(ctx, canvas, W, H, 1); }

// ---- DOWNLOAD IMAGE (2× re-render) ----
dlBtn.addEventListener('click', () => {
  if (!srcImg) return;
  progressWrap.style.display = 'flex';
  progressBar.style.width = '0%';
  progressLabel.textContent = 'Rendering…';
  requestAnimationFrame(() => {
    const scale = 2;
    const oc = document.createElement('canvas');
    oc.width = W * scale; oc.height = H * scale;
    const octx = oc.getContext('2d');
    renderToCtx(octx, oc, W * scale, H * scale, scale);
    progressBar.style.width = '100%';
    progressLabel.textContent = 'Saving…';
    const a = document.createElement('a');
    a.download = 'lenningcreative_moon.transmission.png';
    a.href = oc.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 1200);
  });
});

// ---- MOON VOICE ----
let audioCtx        = null;
let voiceActive     = false;
let voiceAudioStream = null;

function makeDistCurve(amount) {
  const n = 512, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
  }
  return curve;
}

async function toggleMoonVoice() {
  if (voiceActive) { stopMoonVoice(); return; }
  try {
    const micRaw = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(micRaw);

    // Hi-pass: cut mud below 400 Hz
    const hipass = audioCtx.createBiquadFilter();
    hipass.type = 'highpass'; hipass.frequency.value = 400;

    // Bandpass: keep 500–4000 Hz (radio telephone range)
    const bandpass = audioCtx.createBiquadFilter();
    bandpass.type = 'bandpass'; bandpass.frequency.value = 2000; bandpass.Q.value = 0.7;

    // Distortion: transmission grit
    const dist = audioCtx.createWaveShaper();
    dist.curve = makeDistCurve(90); dist.oversample = '2x';

    // Ring modulation at 45 Hz → robotic buzz
    const carrierOsc = audioCtx.createOscillator();
    carrierOsc.type = 'sine'; carrierOsc.frequency.value = 45;
    const modGain = audioCtx.createGain();
    modGain.gain.value = 0.5; // DC offset so gain stays > 0
    const modDepth = audioCtx.createGain();
    modDepth.gain.value = 0.5;
    carrierOsc.connect(modDepth); modDepth.connect(modGain.gain);

    // Echo: transmission delay
    const echo = audioCtx.createDelay(1.0);
    echo.delayTime.value = 0.07;
    const echoFB = audioCtx.createGain(); echoFB.gain.value = 0.22;
    echo.connect(echoFB); echoFB.connect(echo);

    // Output
    const out = audioCtx.createGain(); out.gain.value = 1.3;

    // Chain
    src.connect(hipass);
    hipass.connect(bandpass);
    bandpass.connect(dist);
    dist.connect(modGain);
    modGain.connect(echo);
    modGain.connect(out);
    echo.connect(out);
    out.connect(audioCtx.destination);

    // Audio track for video export
    const audioDest = audioCtx.createMediaStreamDestination();
    out.connect(audioDest);
    voiceAudioStream = audioDest.stream;

    carrierOsc.start();
    voiceActive = true;
    voiceBtn.textContent = '⬤ Moon Voice On';
    voiceBtn.classList.add('active');
  } catch(e) {
    alert('Microphone access is required for Moon Voice.');
  }
}

function stopMoonVoice() {
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  voiceActive = false; voiceAudioStream = null;
  voiceBtn.textContent = '🎙 Moon Voice';
  voiceBtn.classList.remove('active');
}

voiceBtn.addEventListener('click', toggleMoonVoice);

// ---- EXPORT VIDEO ----
let mediaRecorder = null;

recBtn.addEventListener('click', () => {
  if (isRecording) return;

  if (typeof canvas.captureStream !== 'function') {
    alert('Video export is not supported on this browser.\nTry Chrome on Android or a desktop browser.');
    return;
  }

  const candidates = [
    { mime: 'video/mp4;codecs=avc1', ext: 'mp4' },
    { mime: 'video/mp4',             ext: 'mp4' },
    { mime: 'video/webm;codecs=vp9', ext: 'webm' },
    { mime: 'video/webm',            ext: 'webm' },
  ];
  const chosen = candidates.find(c => MediaRecorder.isTypeSupported(c.mime));
  if (!chosen) { alert('Your browser does not support video recording.'); return; }

  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  const bps = isMobile ? 5_000_000 : 20_000_000;

  const slowmoPct = +slowmoSlider.value / 100;
  const duration  = (srcVid.duration / slowmoPct) * 1000;

  try {
    const canvasStream = canvas.captureStream(30);
    const tracks = [...canvasStream.getTracks()];
    if (voiceActive && voiceAudioStream) {
      voiceAudioStream.getAudioTracks().forEach(t => tracks.push(t));
    }
    const stream = new MediaStream(tracks);

    const chunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: chosen.mime, videoBitsPerSecond: bps });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = () => {
      isRecording = false;
      clearInterval(recTimerInterval);
      recBtn.disabled = false;
      recBtn.textContent = '⬤ Export MP4';
      progressBar.style.width = '100%';
      progressLabel.textContent = 'Saving…';
      const blob = new Blob(chunks, { type: chosen.mime });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.download = `lenningcreative_moon.transmission.${chosen.ext}`;
      a.href = url;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 1500);
      srcVid.play();
      startVideoLoop();
    };

    srcVid.currentTime = 0;
    srcVid.play();
    mediaRecorder.start();
    isRecording = true;
    recBtn.disabled = true;
    recBtn.textContent = 'Exporting…';

    progressWrap.style.display = 'flex';
    progressBar.style.width = '0%';
    progressLabel.textContent = 'Exporting…';
    const recStart = Date.now();
    recTimerInterval = setInterval(() => {
      const elapsed = Date.now() - recStart;
      progressBar.style.width = Math.min((elapsed / duration) * 100, 99) + '%';
      const remaining = Math.max(0, Math.ceil((duration - elapsed) / 1000));
      progressLabel.textContent = `${remaining}s remaining`;
    }, 200);

    setTimeout(() => { if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop(); }, duration);
  } catch(e) {
    alert('Video export failed: ' + e.message);
    isRecording = false;
  }
});
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
