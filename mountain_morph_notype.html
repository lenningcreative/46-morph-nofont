const BLOCKS = [
  [160,615],[220,435],[155,345],[235,250],[370,45],[545,615],
  [545,700],[635,700],
  [635,615],[635,90],[940,90],[1040,615]
];

const HOLD = 900;
const MORPH = 1600;
const TEXT_FADE_IN = 400;
const TEXT_FADE_OUT = 300;
const TEXT_DELAY = 200;

function ease(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpPts(a, b, t) { return a.map((p, i) => [lerp(p[0], b[i][0], t), lerp(p[1], b[i][1], t)]); }
function ptsStr(arr) { return arr.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' '); }

const poly = document.getElementById('mtn');
const nameEl = document.getElementById('mname');
const elevEl = document.getElementById('melev');
const labelEl = document.getElementById('label');

labelEl.setAttribute('opacity', '0');
poly.setAttribute('points', ptsStr(BLOCKS));

function run(fromPts, fromIdx) {
  // fromIdx: -1 = blocks intro, 0..43 = peaks index
  const toIdx = fromIdx === -1 ? 0 : (fromIdx + 1) % peaks.length;
  const toPts = peaks[toIdx].pts;
  const holdTime = fromIdx === -1 ? 1200 : HOLD;

  setTimeout(function() {
    const t0 = performance.now();
    let morphDone = false;
    let textAnimId = null;
    let textDelayTimer = null;
    let nextTimer = null;

    // Capture current label opacity for fade-out
    const startOpacity = fromIdx >= 0 ? 1 : 0;

    function frame(now) {
      const elapsed = now - t0;
      const rawT = Math.min(elapsed / MORPH, 1);
      const e = ease(rawT);
      poly.setAttribute('points', ptsStr(lerpPts(fromPts, toPts, e)));

      // Fade out old label during first TEXT_FADE_OUT ms of morph
      if (fromIdx >= 0) {
        const fadeOutT = Math.min(elapsed / TEXT_FADE_OUT, 1);
        labelEl.setAttribute('opacity', String(startOpacity * (1 - fadeOutT)));
      }

      if (rawT >= 1 && !morphDone) {
        morphDone = true;
        poly.setAttribute('points', ptsStr(toPts));
        labelEl.setAttribute('opacity', '0');
        nameEl.textContent = peaks[toIdx].name;
        elevEl.textContent = peaks[toIdx].elev;

        // Delay then fade in new text
        textDelayTimer = setTimeout(function() {
          const fadeInStart = performance.now();
          function fadeIn(now2) {
            const dt = now2 - fadeInStart;
            const ft = Math.min(dt / TEXT_FADE_IN, 1);
            labelEl.setAttribute('opacity', String(ft));
            if (ft < 1) {
              textAnimId = requestAnimationFrame(fadeIn);
            } else {
              textAnimId = null;
            }
          }
          textAnimId = requestAnimationFrame(fadeIn);
        }, TEXT_DELAY);

        // Schedule next morph after hold
        nextTimer = setTimeout(function() {
          if (textAnimId !== null) {
            cancelAnimationFrame(textAnimId);
            textAnimId = null;
          }
          run(toPts, toIdx);
        }, HOLD);

        return; // stop calling frame
      }

      if (rawT < 1) {
        requestAnimationFrame(frame);
      }
    }

    requestAnimationFrame(frame);
  }, holdTime);
}

run(BLOCKS, -1);
