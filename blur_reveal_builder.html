<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blur Reveal Builder</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0e0e0e;
  color: #e0e0e0;
  font-family: system-ui, -apple-system, sans-serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* ---- SIDEBAR ---- */
#sidebar {
  width: 220px;
  min-width: 220px;
  height: 100vh;
  border-right: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  padding: 28px 20px;
  gap: 28px;
}

.wordmark {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.22);
}

.drop-zone {
  border: 1px dashed rgba(255,255,255,0.14);
  border-radius: 10px;
  padding: 22px 10px;
  text-align: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, background 0.2s;
  flex-shrink: 0;
}
.drop-zone:hover, .drop-zone.dragover {
  border-color: rgba(255,255,255,0.32);
  background: rgba(255,255,255,0.03);
}
.drop-zone.loaded {
  padding: 0;
  border-style: solid;
  border-color: rgba(255,255,255,0.12);
}
.drop-zone.loaded img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 9px;
  display: block;
  filter: brightness(0.65);
}
.drop-zone input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}
.dz-icon { font-size: 22px; opacity: 0.18; margin-bottom: 8px; }
.dz-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
.dz-sub { font-size: 10px; color: rgba(255,255,255,0.18); }
.dz-swap {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 6px;
  font-size: 10px;
  letter-spacing: 0.07em;
  color: rgba(255,255,255,0.4);
  background: rgba(0,0,0,0.5);
  text-align: center;
  border-radius: 0 0 9px 9px;
  opacity: 0;
  transition: opacity 0.2s;
}
.drop-zone.loaded:hover .dz-swap { opacity: 1; }

/* sliders */
#controls {
  display: none;
  flex-direction: column;
  gap: 20px;
  flex: 1;
}

.ctrl-group { display: flex; flex-direction: column; gap: 8px; }
.ctrl-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.ctrl-label span:first-child {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
}
.ctrl-label span:last-child {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
}
input[type=range] {
  width: 100%;
  accent-color: rgba(255,255,255,0.55);
  cursor: pointer;
}

#dl-btn {
  margin-top: auto;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.18);
  background: none;
  color: rgba(255,255,255,0.55);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  display: none;
}
#dl-btn:hover {
  border-color: rgba(255,255,255,0.4);
  color: rgba(255,255,255,0.9);
  background: rgba(255,255,255,0.05);
}

/* ---- CANVAS AREA ---- */
#canvas-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

#drop-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: rgba(255,255,255,0.15);
}
#drop-overlay .big-plus { font-size: 48px; opacity: 0.15; }
#drop-overlay p { font-size: 13px; letter-spacing: 0.06em; }

#hint {
  position: absolute;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  letter-spacing: 0.07em;
  color: rgba(255,255,255,0.2);
  pointer-events: none;
  transition: opacity 1.2s;
  white-space: nowrap;
}
#hint.hidden { opacity: 0; }

canvas {
  display: block;
  max-width: 100%;
  max-height: 100vh;
  cursor: none;
}

.ring {
  position: fixed;
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.55);
  pointer-events: none;
  transform: translate(-50%,-50%);
  z-index: 9999;
  display: none;
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="wordmark">Blur Reveal</div>

  <div class="drop-zone" id="zone">
    <div class="dz-icon">+</div>
    <div class="dz-label">Drop image here</div>
    <div class="dz-sub">PNG · JPG · WebP</div>
    <input type="file" accept="image/*" id="file-input">
  </div>

  <div id="controls">
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Blur</span><span id="blur-val">24px</span></div>
      <input type="range" id="blur-amount" min="4" max="60" value="24" step="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Motion blur</span><span id="motion-val">18px</span></div>
      <input type="range" id="motion-amount" min="0" max="80" value="18" step="2">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Noise</span><span id="noise-val">28%</span></div>
      <input type="range" id="noise-amount" min="0" max="80" value="28" step="1">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Brush size</span><span id="brush-val">180</span></div>
      <input type="range" id="brush-size" min="60" max="320" value="180" step="10">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label"><span>Lag</span><span id="lag-val">4</span></div>
      <input type="range" id="lag-amt" min="1" max="10" value="4" step="1">
    </div>
  </div>

  <button id="dl-btn">&#8595; Download as HTML</button>
</div>

<div id="canvas-area">
  <div id="drop-overlay">
    <div class="big-plus">+</div>
    <p>Drop an image to begin</p>
  </div>
  <canvas id="c" style="display:none"></canvas>
  <p id="hint" class="hidden">Move cursor over image to reveal</p>
</div>

<div class="ring" id="ring"></div>

<script>
const EASE_TABLE = [0.055, 0.045, 0.036, 0.028, 0.022, 0.017, 0.013, 0.01, 0.008, 0.006];

let cleanDataURL = null;
let blurPx = 24, motionPx = 18, noisePct = 28, brushRadius = 180, lagVal = 4;
let W, H;
let blurImg = new Image(), cleanImg = new Image();
let cleanCanvas, maskCanvas, maskCtx;
let targetPos = null, brushPos = null, rafId = null;
let blurDebounce = null;

const zone         = document.getElementById('zone');
const fileInput    = document.getElementById('file-input');
const controls     = document.getElementById('controls');
const dlBtn        = document.getElementById('dl-btn');
const overlay      = document.getElementById('drop-overlay');
const hint         = document.getElementById('hint');
const ring         = document.getElementById('ring');
const canvas       = document.getElementById('c');
const mainCtx      = canvas.getContext('2d');
const blurSlider   = document.getElementById('blur-amount');
const motionSlider = document.getElementById('motion-amount');
const noiseSlider  = document.getElementById('noise-amount');
const brushSlider  = document.getElementById('brush-size');
const lagSlider    = document.getElementById('lag-amt');
const blurValEl    = document.getElementById('blur-val');
const motionValEl  = document.getElementById('motion-val');
const noiseValEl   = document.getElementById('noise-val');
const brushValEl   = document.getElementById('brush-val');
const lagValEl     = document.getElementById('lag-val');

// ---- FILE LOAD ----
function loadFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    cleanDataURL = e.target.result;
    zone.innerHTML = '';
    const thumb = document.createElement('img');
    thumb.src = cleanDataURL;
    const swap = document.createElement('div');
    swap.className = 'dz-swap';
    swap.textContent = 'swap image';
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = ev => loadFile(ev.target.files[0]);
    zone.appendChild(thumb);
    zone.appendChild(swap);
    zone.appendChild(inp);
    zone.classList.add('loaded');
    controls.style.display = 'flex';
    dlBtn.style.display = 'block';
    buildAndRender();
  };
  reader.readAsDataURL(file);
}

fileInput.onchange = e => loadFile(e.target.files[0]);
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); loadFile(e.dataTransfer.files[0]); });

// Also allow dropping anywhere on canvas area
const canvasArea = document.getElementById('canvas-area');
canvasArea.addEventListener('dragover', e => e.preventDefault());
canvasArea.addEventListener('drop', e => { e.preventDefault(); loadFile(e.dataTransfer.files[0]); });

// ---- SLIDERS ----
function scheduleRebuild() {
  clearTimeout(blurDebounce);
  blurDebounce = setTimeout(rebuildBlur, 80);
}
blurSlider.oninput = () => {
  blurPx = +blurSlider.value;
  blurValEl.textContent = blurPx + 'px';
  scheduleRebuild();
};
motionSlider.oninput = () => {
  motionPx = +motionSlider.value;
  motionValEl.textContent = motionPx + 'px';
  scheduleRebuild();
};
noiseSlider.oninput = () => {
  noisePct = +noiseSlider.value;
  noiseValEl.textContent = noisePct + '%';
  scheduleRebuild();
};
brushSlider.oninput = () => {
  brushRadius = +brushSlider.value;
  brushValEl.textContent = brushRadius;
};
lagSlider.oninput = () => {
  lagVal = +lagSlider.value;
  lagValEl.textContent = lagVal;
};

// ---- BUILD ----
function buildAndRender() {
  overlay.style.display = 'none';
  canvas.style.display = 'block';
  hint.classList.remove('hidden');

  const src = new Image();
  src.onload = () => {
    W = src.naturalWidth; H = src.naturalHeight;
    canvas.width = W; canvas.height = H;
    sizeCanvas();

    cleanCanvas = document.createElement('canvas');
    cleanCanvas.width = W; cleanCanvas.height = H;
    cleanCanvas.getContext('2d').drawImage(src, 0, 0);

    cleanImg = src;

    applyBlurAndInit(src);
  };
  src.src = cleanDataURL;
}

function sizeCanvas() {
  const area = canvasArea.getBoundingClientRect();
  const scale = Math.min(area.width / W, area.height / H, 1);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}

function applyBlurAndInit(srcImg) {
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const t = tmp.getContext('2d');

  // 1. Gaussian blur
  t.filter = `blur(${blurPx}px)`;
  t.drawImage(srcImg, 0, 0);
  t.filter = 'none';

  // 2. Motion blur — stack offset copies along a diagonal
  if (motionPx > 0) {
    const steps = Math.max(4, Math.floor(motionPx / 3));
    const alpha = 0.55 / steps;
    for (let i = 1; i <= steps; i++) {
      const d = (i / steps) * motionPx;
      t.globalAlpha = alpha;
      t.drawImage(tmp, d, d * 0.4);
    }
    t.globalAlpha = 1;
  }

  // 3. Noise — scatter random pixels at low opacity
  if (noisePct > 0) {
    const imageData = t.getImageData(0, 0, W, H);
    const data = imageData.data;
    const strength = noisePct / 100;
    for (let i = 0; i < data.length; i += 4) {
      const n = (Math.random() - 0.5) * 255 * strength;
      data[i]     = Math.min(255, Math.max(0, data[i]     + n));
      data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + n));
      data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + n));
    }
    t.putImageData(imageData, 0, 0);
  }

  blurImg = new Image();
  blurImg.onload = () => {
    maskCanvas = document.createElement('canvas');
    maskCanvas.width = W; maskCanvas.height = H;
    maskCtx = maskCanvas.getContext('2d');
    targetPos = null; brushPos = null;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    draw();
  };
  blurImg.src = tmp.toDataURL('image/jpeg', 0.92);
}

function rebuildBlur() {
  if (!cleanImg.complete || !W) return;
  applyBlurAndInit(cleanImg);
}

// ---- DRAW ----
function draw() {
  mainCtx.drawImage(blurImg, 0, 0, W, H);
  if (!maskCanvas) return;
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const t = tmp.getContext('2d');
  t.drawImage(cleanCanvas, 0, 0);
  t.globalCompositeOperation = 'destination-in';
  t.drawImage(maskCanvas, 0, 0);
  mainCtx.drawImage(tmp, 0, 0);
}

function revealAt(cx, cy) {
  if (!maskCtx) return;
  const r = brushRadius;
  const g = maskCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
  g.addColorStop(0,    'rgba(255,255,255,1)');
  g.addColorStop(0.18, 'rgba(255,255,255,0.95)');
  g.addColorStop(0.5,  'rgba(255,255,255,0.6)');
  g.addColorStop(0.75, 'rgba(255,255,255,0.25)');
  g.addColorStop(1,    'rgba(255,255,255,0)');
  maskCtx.globalCompositeOperation = 'source-over';
  maskCtx.fillStyle = g;
  maskCtx.beginPath();
  maskCtx.arc(cx, cy, r, 0, Math.PI * 2);
  maskCtx.fill();
  draw();
}

function animateBrush() {
  if (!targetPos || !brushPos) { rafId = null; return; }
  const ease = EASE_TABLE[lagVal - 1];
  const dx = targetPos.x - brushPos.x, dy = targetPos.y - brushPos.y;
  if (Math.sqrt(dx*dx + dy*dy) < 0.3) { revealAt(targetPos.x, targetPos.y); rafId = null; return; }
  brushPos.x += dx * ease;
  brushPos.y += dy * ease;
  revealAt(brushPos.x, brushPos.y);
  rafId = requestAnimationFrame(animateBrush);
}

function toImg(e) {
  const r = canvas.getBoundingClientRect(), s = e.touches ? e.touches[0] : e;
  return { x: (s.clientX - r.left) * W / r.width, y: (s.clientY - r.top) * H / r.height };
}

canvas.addEventListener('mousemove', e => {
  if (!W) return;
  e.preventDefault();
  hint.classList.add('hidden');
  const p = toImg(e);
  targetPos = p;
  if (!brushPos) brushPos = { ...p };
  if (!rafId) rafId = requestAnimationFrame(animateBrush);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (!W) return;
  e.preventDefault();
  hint.classList.add('hidden');
  const p = toImg(e);
  targetPos = p;
  if (!brushPos) brushPos = { ...p };
  if (!rafId) rafId = requestAnimationFrame(animateBrush);
}, { passive: false });

canvas.addEventListener('mouseleave', () => { if (brushPos) targetPos = { ...brushPos }; ring.style.display = 'none'; });
canvas.addEventListener('touchend',   () => { if (brushPos) targetPos = { ...brushPos }; });
canvas.addEventListener('mouseenter', () => { if (W) ring.style.display = 'block'; });
document.addEventListener('mousemove', e => { ring.style.left = e.clientX + 'px'; ring.style.top = e.clientY + 'px'; });
window.addEventListener('resize', () => { if (W) sizeCanvas(); });

// ---- EXPORT ----
dlBtn.addEventListener('click', () => {
  if (!blurImg.src || !cleanDataURL) return;
  const ease = EASE_TABLE[lagVal - 1];
  const html = buildExportHTML(blurImg.src, cleanDataURL, brushRadius, ease);
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'blur-reveal.html';
  a.click();
});

function buildExportHTML(blurB64, cleanB64, brushR, ease) {
return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blur Reveal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0e0e0e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif}
canvas{display:block;max-width:90vw;max-height:90vh;cursor:none}
#hint{color:rgba(255,255,255,0.22);font-size:11px;margin-top:14px;letter-spacing:.07em;transition:opacity 1.2s}
#hint.h{opacity:0}
.ring{position:fixed;width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(255,255,255,.55);pointer-events:none;transform:translate(-50%,-50%);z-index:9999;display:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<p id="hint">Move your cursor over the image to reveal</p>
<div class="ring" id="ring"></div>
<script>
const BRUSH=${brushR},EASE=${ease};
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),hint=document.getElementById('hint'),ring=document.getElementById('ring');
let W,H,cleanCanvas,maskCanvas,maskCtx,targetPos=null,brushPos=null,rafId=null;
const blurImg=new Image(),cleanImg=new Image();let loaded=0;
function onLoad(){if(++loaded<2)return;W=cleanImg.naturalWidth;H=cleanImg.naturalHeight;canvas.width=W;canvas.height=H;const s=Math.min(window.innerWidth*.9/W,window.innerHeight*.9/H,1);canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px';cleanCanvas=document.createElement('canvas');cleanCanvas.width=W;cleanCanvas.height=H;cleanCanvas.getContext('2d').drawImage(cleanImg,0,0);maskCanvas=document.createElement('canvas');maskCanvas.width=W;maskCanvas.height=H;maskCtx=maskCanvas.getContext('2d');draw();}
blurImg.onload=cleanImg.onload=onLoad;
blurImg.src='${blurB64}';
cleanImg.src='${cleanB64}';
function draw(){ctx.drawImage(blurImg,0,0,W,H);const t=document.createElement('canvas');t.width=W;t.height=H;const x=t.getContext('2d');x.drawImage(cleanCanvas,0,0);x.globalCompositeOperation='destination-in';x.drawImage(maskCanvas,0,0);ctx.drawImage(t,0,0);}
function revealAt(cx,cy){const g=maskCtx.createRadialGradient(cx,cy,0,cx,cy,BRUSH);g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.18,'rgba(255,255,255,.95)');g.addColorStop(.5,'rgba(255,255,255,.6)');g.addColorStop(.75,'rgba(255,255,255,.25)');g.addColorStop(1,'rgba(255,255,255,0)');maskCtx.globalCompositeOperation='source-over';maskCtx.fillStyle=g;maskCtx.beginPath();maskCtx.arc(cx,cy,BRUSH,0,Math.PI*2);maskCtx.fill();draw();}
function anim(){if(!targetPos||!brushPos){rafId=null;return;}const dx=targetPos.x-brushPos.x,dy=targetPos.y-brushPos.y;if(Math.sqrt(dx*dx+dy*dy)<.3){revealAt(targetPos.x,targetPos.y);rafId=null;return;}brushPos.x+=dx*EASE;brushPos.y+=dy*EASE;revealAt(brushPos.x,brushPos.y);rafId=requestAnimationFrame(anim);}
function toImg(e){const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*W/r.width,y:(s.clientY-r.top)*H/r.height};}
canvas.addEventListener('mousemove',e=>{e.preventDefault();hint.classList.add('h');const p=toImg(e);targetPos=p;if(!brushPos)brushPos={...p};if(!rafId)rafId=requestAnimationFrame(anim);},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();hint.classList.add('h');const p=toImg(e);targetPos=p;if(!brushPos)brushPos={...p};if(!rafId)rafId=requestAnimationFrame(anim);},{passive:false});
canvas.addEventListener('mouseleave',()=>{if(brushPos)targetPos={...brushPos};});
canvas.addEventListener('touchend',()=>{if(brushPos)targetPos={...brushPos};});
canvas.addEventListener('mouseenter',()=>ring.style.display='block');
canvas.addEventListener('mouseleave',()=>ring.style.display='none');
document.addEventListener('mousemove',e=>{ring.style.left=e.clientX+'px';ring.style.top=e.clientY+'px';});
<\/script>
</body>
</html>`;
}
</script>
</body>
</html>
